# tbox demo SSO stack.
#
# Bring up:  docker compose up -d
# Tear down: docker compose down -v
# Verify:    curl -i http://localhost:9080/        -> 302 -> Keycloak
#            Login tbox/password                    -> 200 Hello, tbox! (role: tbox-user)
#
# See tbox/AGENTS.md for ports, env, role, and gotchas.

# Pull in the OTel tracer stack (otel-collector, tempo, grafana) from a
# separate file. The included file declares its own services and the
# external network `tbox-net` (same one this file creates).
include:
  - path: ./tracer/docker-compose.tracer.yml

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.13
    container_name: tbox-etcd
    command:
      - etcd
      - --name=etcd0
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd:2380
      - --initial-cluster=etcd0=http://etcd:2380
      - --initial-cluster-token=etcd-cluster-1
      - --initial-cluster-state=new
    networks:
      - tbox-net
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health", "--cluster"]
      interval: 5s
      timeout: 3s
      retries: 10

  apisix:
    image: apache/apisix:3.13.0-debian
    container_name: tbox-apisix
    depends_on:
      etcd:
        condition: service_healthy
    environment:
      APISIX_STANDALONE_MODE: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
    ports:
      - "9080:9080"
    volumes:
      - ./apisix/conf/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    networks:
      - tbox-net

  keycloak-db:
    image: postgres:16-alpine
    container_name: tbox-keycloak-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-keycloak}
      POSTGRES_USER: ${POSTGRES_USER:-keycloak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - kc-db:/var/lib/postgresql/data
    networks:
      - tbox-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-keycloak} -d ${POSTGRES_DB:-keycloak}"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.6
    container_name: tbox-keycloak
    depends_on:
      keycloak-db:
        condition: service_healthy
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/9000 && printf \"GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && grep -q 200 <&3'"]
      interval: 5s
      timeout: 3s
      retries: 20
    command: >
      start-dev
      --http-port=8080
      --import-realm
      --features=preview
    networks:
      - tbox-net

  service-a:
    build:
      context: ./services/service-a
      dockerfile: Dockerfile
    container_name: tbox-service-a
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: service-a
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=tbox
    networks:
      - tbox-net
    # No host port: reachable only via APISIX. Reaching it directly
    # from the host requires `docker exec` or attaching another network.

  service-b:
    build:
      context: ./services/service-b
      dockerfile: Dockerfile
    container_name: tbox-service-b
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: service-b
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=tbox
    networks:
      - tbox-net
    # No host port: reachable only via APISIX.

networks:
  tbox-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.26.0.0/16
          gateway: 172.26.0.1

volumes:
  kc-db:
