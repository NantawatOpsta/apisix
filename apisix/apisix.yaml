# Standalone APISIX config. Loaded by entrypoint command in docker-compose.
#
# Flow per request that hits APISIX on :9080:
#   - If session cookie absent AND no valid token -> redirect to Keycloak authorize.
#   - After callback, APISIX exchanges code for tokens, stores session,
#     and forwards request to upstream with `X-Userinfo` header.
#
# service-a upstream is reachable as `service-a:3000` on the docker network.

upstreams:
  - id: service-a-up
    name: service-a-up
    type: roundrobin
    nodes:
      - host: service-a
        port: 3000
        weight: 1
  - id: service-b-up
    name: service-b-up
    type: roundrobin
    nodes:
      - host: service-b
        port: 3001
        weight: 1

# Plugin metadata — applied to all instances of the opentelemetry plugin.
# Without this, the default collector address (127.0.0.1:4318) is used.
#
# In standalone YAML mode (config_provider: yaml), plugin_metadata MUST be a
# list of objects each with `id` = plugin name. A dict keyed by plugin name
# is silently dropped because config_yaml.lua iterates with ipairs().
plugin_metadata:
  - id: opentelemetry
    resource:
      service.name: APISIX
    collector:
      address: otel-collector:4318
      request_timeout: 3
    batch_span_processor:
      drop_on_queue_full: false
      max_queue_size: 1024
      batch_timeout: 2
      inactive_timeout: 1
      max_export_batch_size: 16

routes:
  - id: svc-a-root
    name: svc-a-root
    uri: /*
    upstream_id: service-a-up
    plugins:
      opentelemetry:
        sampler:
          name: always_on
      openid-connect:
        client_id: apisix-gateway
        client_secret: "80a1f14355b25096a4ac7049c5f287d2b05f0da117f37770d873909526268cf8"
        discovery: "http://172.26.0.1:8080/realms/tbox/.well-known/openid-configuration"
        redirect_uri: "http://localhost:9080/cb"
        logout_path: /logout
        post_logout_redirect_uri: "http://localhost:9080/"
        bearer_only: false
        ssl_verify: false
        set_userinfo_header: true
        set_id_token_header: true
        scope: "openid email profile"
        session:
          secret: "change-this-in-prod-32chars-min"
  - id: svc-b-root
    name: svc-b-root
    uri: /service-b*
    upstream_id: service-b-up
    plugins:
      opentelemetry:
        sampler:
          name: always_on
      serverless-pre-function:
        phase: access
        functions:
          - |
            return function(conf, ctx)
              local core = require("apisix.core")
              local required = "tbox-user-service-b"
              local b64 = core.request.header(ctx, "X-Userinfo")
              if not b64 then
                return core.response.exit(401, "missing identity header")
              end
              local ok, raw = pcall(ngx.decode_base64, b64)
              if not ok or not raw then
                return core.response.exit(401, "malformed X-Userinfo")
              end
              local info = require("cjson.safe").decode(raw)
              local roles = info and info.realm_access and info.realm_access.roles or {}
              for _, r in ipairs(roles) do
                if r == required then return end
              end
              return core.response.exit(403, "forbidden: missing role " .. required)
            end
      proxy-rewrite:
        regex_uri:
          - "^/service-b(.*)$"
          - "/$1"
      openid-connect:
        client_id: apisix-gateway
        client_secret: "80a1f14355b25096a4ac7049c5f287d2b05f0da117f37770d873909526268cf8"
        discovery: "http://172.26.0.1:8080/realms/tbox/.well-known/openid-configuration"
        redirect_uri: "http://localhost:9080/cb"
        logout_path: /logout
        post_logout_redirect_uri: "http://localhost:9080/service-b/"
        bearer_only: false
        ssl_verify: false
        set_userinfo_header: true
        set_id_token_header: true
        scope: "openid email profile"
        session:
          secret: "change-this-in-prod-32chars-min"

#END
