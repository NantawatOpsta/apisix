---
deployment:
  role: traditional
  role_traditional:
    config_provider: yaml
  admin:
    # schema requires a list of key objects; standalone + enable_admin=false
    # below means this is never used to authenticate Admin API requests.
    #
    # The hardcoded admin_key below is INTENTIONALLY DEMO-ONLY.
    # Because enable_admin above defaults to false, this key is dead at runtime
    # — APISIX never consults it for authentication on this image.
    # If you flip enable_admin: true, rotate this key first:
    #   - move to .env / APISIX_ADMIN_KEY (use $ENV:// in admin_key[0].key)
    #   - see SECRET_REGEN.md for the rotation procedure
    #   - also rotate keycloak/tbox-realm.json's KEYCLOAK_CLIENT_SECRET
    #     (the realm client's secret is independent of admin_key)
    admin_key:
      - name: admin
        key: "2LclAgQpvh6JJHdtg6LSCcXaiE08GhAb"
        role: super
  etcd:
    prefix: "/apisix"
    host:
      - "http://etcd:2379"

apisix:
  enable_admin: false          # standalone mode, no Admin API
  enable_dev_mode: true
  enable_standalone: true
  config_center: yaml
  ssl:
    enable: false
  listen:
    - port: 9080
  stream:
    - enable: false

ext-plugin:
  enable: false
